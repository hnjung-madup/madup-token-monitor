<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매드업 토큰 모니터 — 로그인 완료</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #f6f6f7;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2eb67d;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }
    .checkmark {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(46, 182, 125, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 16px;
    }
    .hint {
      margin-top: 24px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .error {
      color: #dc2626;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>로그인 완료</h1>
    <p id="status"><span class="spinner"></span>매드업 토큰 모니터 앱을 여는 중입니다…</p>
    <div class="hint">앱이 자동으로 열리지 않으면, 도크에서 <strong>매드업 토큰 모니터</strong>를 직접 열어주세요. 이 페이지는 닫으셔도 됩니다.</div>
  </div>
  <script>
    (function () {
      var hash = window.location.hash || '';
      var query = window.location.search || '';
      var status = document.getElementById('status');

      // Supabase는 fragment(#access_token=…) 또는 query(?code=…)로 토큰을 보냄.
      // 둘 다 그대로 deep-link로 전달.
      if (!hash && !query) {
        status.innerHTML = '<span class="error">인증 정보가 없습니다. 앱에서 다시 시도해주세요.</span>';
        return;
      }

      var deepLink = 'madup-token-monitor://auth/callback' + query + hash;

      try {
        window.location.replace(deepLink);
      } catch (e) {
        status.innerHTML = '<span class="error">앱을 열 수 없습니다. 매드업 토큰 모니터가 설치되어 있는지 확인해주세요.</span>';
        return;
      }

      // 일부 브라우저는 사용자 액션 없이 close를 막음 — 시도만 (silent fail OK)
      setTimeout(function () {
        try { window.close(); } catch (e) {}
      }, 800);

      // 1.5초 후에도 페이지가 그대로면 안내 문구 변경
      setTimeout(function () {
        status.innerHTML = '앱이 자동으로 열렸습니다. 이 탭을 닫아주세요.';
      }, 1500);
    })();
  </script>
</body>
</html>

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macOS 전용 release. Windows 지원은 v0.2 이후 검토.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        # pnpm 11+ 가 CI 모드에서 ignored build scripts(esbuild의 native 다운로드 등)를
        # 치명적 에러로 처리 — 명시적으로 모든 빌드 허용.
        run: pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Write .env (vite inline)
        # tauri-action 이 sub-process 에 env forwarding 을 일부 누락하는 케이스 우회.
        # vite 가 .env 파일을 직접 읽어 import.meta.env 로 inline 하도록 명시 작성.
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          echo "URL length: ${#URL}"
          echo "KEY length: ${#KEY}"
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::Supabase secrets are missing or empty"
            exit 1
          fi
          {
            echo "VITE_SUPABASE_URL=$URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$KEY"
          } > .env
          echo "✓ .env written ($(wc -l < .env) lines)"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "매드업 토큰 모니터 ${{ github.ref_name }}"
          releaseBody: |
            ## 변경 사항
            GitHub Releases에서 자동 업데이트가 지원됩니다.

            ### 설치
            - macOS (Apple Silicon): `*_aarch64.dmg`
            - macOS (Intel): `*_x64.dmg`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

name: Build

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - ".claude/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".claude/**"
      - "**/*.md"

jobs:
  build:
    # macOS 전용 빌드. Windows 지원은 v0.2 이후 검토.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Write .env (vite inline)
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUCCESS_URL: ${{ secrets.VITE_AUTH_SUCCESS_URL }}
        run: |
          echo "URL length: ${#URL}"
          echo "KEY length: ${#KEY}"
          echo "SUCCESS_URL length: ${#SUCCESS_URL}"
          if [ -z "$URL" ] || [ -z "$KEY" ] || [ -z "$SUCCESS_URL" ]; then
            echo "::error::Required secrets are missing or empty"
            exit 1
          fi
          {
            echo "VITE_SUPABASE_URL=$URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$KEY"
            echo "VITE_AUTH_SUCCESS_URL=$SUCCESS_URL"
          } > .env

      - name: Build (macOS)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # createUpdaterArtifacts:true 라 서명 키가 필수.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: madup-token-monitor-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: warn
          retention-days: 7
